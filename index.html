    <!-- Structured data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Vou precisar migrar tudo do Sienge ou da minha planilha?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Não. Comece pela próxima obra. A migração de obras antigas é opcional e acontece quando você quiser."
          }
        },
        {
          "@type": "Question",
          "name": "Quanto tempo leva a implantação?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A primeira obra entra em operação em poucos dias. O cronograma inicial pode ser importado de planilha e o restante é configurado com o time de implantação."
          }
        },
        {
          "@type": "Question",
          "name": "A IA pode errar. Como confio nela?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A IA propõe, o humano aprova. Nada vira definitivo sem auditoria. É possível configurar um limiar de confiança para auto-aprovação; abaixo disso, sempre passa por revisão."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona o preço?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Por projeto/obra ativa, com plano anual. Fale com o time comercial para receber a proposta adequada ao seu portfólio."
          }
        },
        {
          "@type": "Question",
          "name": "É seguro? Como tratam meus dados?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Multi-tenant com Row-Level Security em 100% das tabelas, isolamento por projeto, audit log de toda ação financeira e soft delete. Conformidade com a LGPD."
          }
        },
        {
          "@type": "Question",
          "name": "Funciona no celular do gestor de obra?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. O gestor fotografa a NF no canteiro e o documento chega ao financeiro já extraído pela IA, vinculado à etapa do cronograma."
          }
        }
      ]
    }
    </script>
